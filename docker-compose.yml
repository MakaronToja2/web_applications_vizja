services:
  # --- TCP layer ---
  tcp-server:
    build: ./tcp_server
    ports:
      - "9000:9000"
    depends_on:
      - api
    environment:
      - API_URL=https://api:8080
      - TCP_PORT=9000

  tcp-agent:
    build: ./tcp_agent
    depends_on:
      - tcp-server
    environment:
      - TCP_SERVER_HOST=tcp-server
      - TCP_SERVER_PORT=9000
      - SERVER_ID=demo-agent-01
    # Scale: docker compose up --scale tcp-agent=3

  # --- REST API + GraphQL ---
  api:
    build: ./api
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=sqlite:///./data/watchdog.db
    volumes:
      - api-data:/app/data
      - ./certs:/app/certs:ro

  # --- Dashboard ---
  dashboard:
    build: ./dashboard
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  api-data:
